name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v1
        with:
          java-version: 15.0.0-ea
      - name: Run the Maven verify phase
        run: |
          cd pact/client
          mvn -B verify --file pom.xml
  
  build-go:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: '1.15.5'
      - name: Install Pact Tools
        run: |
          mkdir pact-cli
          cd pact-cli
          curl -LO https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v1.88.26/pact-1.88.26-linux-x86_64.tar.gz
          tar xzf pact-1.88.26-linux-x86_64.tar.gz
          echo "pact-cli/pact/bin" >> $GITHUB_PATH
          go get github.com/pact-foundation/pact-go@v1
          cd ../pact/server
          pact-mock-service version
          pact-provider-verifier version
          pact-broker version
          go test -v
